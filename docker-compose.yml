services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-controle}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-controle}
      POSTGRES_DB: ${POSTGRES_DB:-controleportaria}
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'pg_isready -U ${POSTGRES_USER:-controle} -d ${POSTGRES_DB:-controleportaria}',
        ]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: ${API_PORT:-3333}
      DATABASE_URL: ${DATABASE_URL:-postgresql://controle:controle@postgres:5432/controleportaria?schema=public}
      JWT_SECRET: ${JWT_SECRET:-controleportaria-dev-jwt-secret-2026-change-me}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-1d}
      DATA_ENCRYPTION_KEY: ${DATA_ENCRYPTION_KEY:-controleportaria-dev-data-encryption-key-2026-change-me}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - '${API_PORT:-3333}:3333'
    command: sh -c "pnpm prisma migrate deploy && node dist/server.js"

  web:
    build:
      context: .
      dockerfile: web/Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-production}
    depends_on:
      - api
    ports:
      - '${WEB_PORT:-3000}:3000'

volumes:
  postgres_data:
